openapi: 3.0.0
info:
  title: Example API
  version: 1.0.0
  description: |
    This is an example API that demonstrates export features.
    You can export this documentation in multiple formats:
    - Markdown (.md)
    - HTML (.html)
    - JSON (OpenAPI spec)
    - YAML (OpenAPI spec)
  contact:
    name: API Support
    email: support@example.com
    url: https://example.com/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.example.com/v1
    description: Production server

tags:
  - name: Users
    description: User management endpoints
  - name: General
    description: General endpoints

paths:
  /hello:
    get:
      tags:
        - General
      summary: Hello endpoint
      description: Returns a simple greeting message
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Hello World!

  /users:
    get:
      tags:
        - Users
      summary: List all users
      description: Get a list of all registered users
      parameters:
        - name: limit
          in: query
          description: Maximum number of users to return
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of users to skip
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
              example:
                users:
                  - id: 1
                    name: John Doe
                    email: john@example.com
                  - id: 2
                    name: Jane Smith
                    email: jane@example.com

    post:
      tags:
        - Users
      summary: Create a new user
      description: Register a new user in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
            example:
              name: John Doe
              email: john@example.com
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    User:
      type: object
      description: User object representing a registered user
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
          description: Unique user identifier
          example: 1
        name:
          type: string
          description: Full name of the user
          example: John Doe
        email:
          type: string
          format: email
          description: Email address of the user
          example: john@example.com
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the user was created
          example: "2024-01-01T12:00:00Z"

    Error:
      type: object
      description: Error response object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type
          example: ValidationError
        message:
          type: string
          description: Human-readable error message
          example: Invalid email format
        details:
          type: array
          description: Detailed error information
          items:
            type: string
          example:
            - "Email is required"
            - "Email must be a valid email address"
